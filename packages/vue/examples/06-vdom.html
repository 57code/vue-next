<div id="app">
  <div v-for="item in arr" :key="item">
    {{ item }}
  </div>
</div>

<script src="../dist/vue.global.js"></script>
<script>
  const app = Vue.createApp({
    data() {
      return {
        title: 'hello',
        arr: ['a', 'b', 'c', 'd']
      }
    },
    mounted () {
      setTimeout(() => {
        // this.title = 'olleh'
        this.arr.splice(1, 0, 'e')
      }, 1000);
    },
  }).mount('#app')
</script>
